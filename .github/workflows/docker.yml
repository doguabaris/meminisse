name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Meminisse image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/doguabaris/meminisse:latest
            ghcr.io/doguabaris/meminisse:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=Meminisse
            org.opencontainers.image.source=https://github.com/doguabaris/meminisse
            org.opencontainers.image.description=Persistent global and workspace memory for Codex sessions.
            org.opencontainers.image.licenses=MIT
